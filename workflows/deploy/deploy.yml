# Simple workflow for deploying static content to GitHub Pages
name: Deploy static site to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Single deploy job (build + upload + deploy)
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # (Optional) If your static site requires a build step (e.g., with npm, Hugo, Jekyll),
      # add it here. For plain HTML/CSS/JS, skip this section.
      # - name: Install dependencies
      #   run: npm ci
      # - name: Build site
      #   run: npm run build

      # Upload the static files to GitHub Pages.
      # Change 'path' to the directory containing your built site.
      # Common values: '.' (repository root), './public', './dist', './_site'
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'   # Adjust if your static files are in a subfolder, e.g., './public'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4